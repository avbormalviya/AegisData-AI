<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181f"/>
      <stop offset="100%" stop-color="#0c0c12"/>
    </linearGradient>

    <!-- Top face — brightest orange -->
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffbe76"/>
      <stop offset="100%" stop-color="#ff9f43"/>
    </linearGradient>

    <!-- Right face — mid orange/coral -->
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9f43"/>
      <stop offset="100%" stop-color="#ee5253"/>
    </linearGradient>

    <!-- Left face — deepest, almost crimson -->
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d63031"/>
      <stop offset="100%" stop-color="#a52c2c"/>
    </linearGradient>

    <!-- Subtle drop shadow -->
    <filter id="cubeShadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6"
                    flood-color="#ee5253" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Dark rounded-square background -->
  <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>

  <!--
    Isometric cube mark centred at (50, 52), height ~50px
    
    Cube geometry (isometric projection):
      Top vertex:        (50, 16)
      Left vertex:       (18, 34)
      Right vertex:      (82, 34)
      Bottom-left:       (18, 70)
      Bottom-right:      (82, 70)
      Bottom vertex:     (50, 88)
    
    Top face    = polygon: (50,16) (82,34) (50,52) (18,34)
    Right face  = polygon: (82,34) (82,70) (50,88) (50,52)
    Left face   = polygon: (18,34) (50,52) (50,88) (18,70)
  -->
  <g filter="url(#cubeShadow)">
    <!-- Top face (lightest) -->
    <polygon points="50,16 82,34 50,52 18,34"
             fill="url(#topFace)"/>

    <!-- Right face (mid) -->
    <polygon points="82,34 82,70 50,88 50,52"
             fill="url(#rightFace)"/>

    <!-- Left face (darkest) -->
    <polygon points="18,34 50,52 50,88 18,70"
             fill="url(#leftFace)"/>
  </g>

  <!--
    Thin edge lines for crispness and depth —
    same color as each face but slightly lighter
  -->
  <!-- Top face edges -->
  <polyline points="50,16 82,34 50,52 18,34 50,16"
            fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.8"/>
  <!-- Vertical edges -->
  <line x1="50" y1="52" x2="50" y2="88"
        stroke="rgba(255,255,255,0.12)" stroke-width="0.8"/>
  <line x1="82" y1="34" x2="82" y2="70"
        stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
  <line x1="18" y1="34" x2="18" y2="70"
        stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
</svg>